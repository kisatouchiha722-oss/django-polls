<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Результаты опроса</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light py-5">
    <div class="container">
        <div class="card shadow mx-auto" style="max-width: 600px;">
            <div class="card-body p-4">
                <h2 class="text-center mb-2">Результаты голосования</h2>
                <h4 class="text-center text-primary mb-4">«{{ poll.title }}»</h4>
                <hr>
                
                <ul class="list-group mb-4 shadow-sm">
                {% for choice in poll.choices.all %}
                    <li class="list-group-item d-flex justify-content-between align-items-center py-3">
                        <span class="fs-5">{{ choice.choice_text }}</span>
                        <span class="badge bg-primary rounded-pill p-2 fs-6">{{ choice.votes_count }} голосов</span>
                    </li>
                {% endfor %}
                </ul>
                
                <div class="d-grid gap-2">
                    <a href="{% url 'polls:index' %}" class="btn btn-secondary py-2">На главную страницу</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
