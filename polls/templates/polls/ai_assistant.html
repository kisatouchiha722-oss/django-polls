<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ИИ Помощник</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'polls:index' %}">📊 Система опросов</a>
            <a class="btn btn-outline-light btn-sm" href="{% url 'polls:index' %}">Назад к опросам</a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white d-flex align-items-center">
                        <h5 class="mb-0">✨ Ваш ИИ-Помощник (GPT-4o)</h5>
                    </div>
                    
                    <div class="card-body bg-white" id="chat-window" style="height: 400px; overflow-y: auto;">
                        <div class="mb-3 text-start">
                            <span class="badge bg-secondary p-2">Бот</span>
                            <div class="p-2 mt-1 bg-light rounded d-inline-block">Привет! Я твой интеллектуальный ассистент. Задай мне любой вопрос!</div>
                        </div>
                    </div>

                    <div class="card-footer bg-light">
                        <div class="input-group">
                            <input type="text" id="user-input" class="form-control" placeholder="Введите ваш вопрос...">
                            <button class="btn btn-primary" type="button" id="send-btn">Отправить</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('send-btn').addEventListener('click', sendMessage);
        document.getElementById('user-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') sendMessage();
        });

        function sendMessage() {
            const inputElement = document.getElementById('user-input');
            const messageText = inputElement.value.trim();
            if (!messageText) return;

            const chatWindow = document.getElementById('chat-window');

            // 1. Добавляем сообщение пользователя на экран
            chatWindow.innerHTML += `
                <div class="mb-3 text-end">
                    <span class="badge bg-primary p-2">Вы</span>
                    <div class="p-2 mt-1 bg-primary text-white rounded d-inline-block">${messageText}</div>
                </div>`;
            
            inputElement.value = '';
            chatWindow.scrollTop = chatWindow.scrollHeight;

            // 2. Показываем индикатор загрузки от бота
            const loadingId = 'loading-' + Date.now();
            chatWindow.innerHTML += `
                <div class="mb-3 text-start" id="${loadingId}">
                    <span class="badge bg-secondary p-2">Бот</span>
                    <div class="p-2 mt-1 bg-light rounded d-inline-block"><i>Думает...</i></div>
                </div>`;
            chatWindow.scrollTop = chatWindow.scrollHeight;

            // 3. Отправляем запрос на сервер Django
            fetch('/api/chat/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': '{{ csrf_token }}'
                },
                body: JSON.stringify({ message: messageText })
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById(loadingId).remove();
                chatWindow.innerHTML += `
                    <div class="mb-3 text-start">
                        <span class="badge bg-secondary p-2">Бот</span>
                        <div class="p-2 mt-1 bg-light rounded d-inline-block">${data.reply}</div>
                    </div>`;
                chatWindow.scrollTop = chatWindow.scrollHeight;
            })
            .catch(error => {
                document.getElementById(loadingId).remove();
                alert('Ошибка связи с сервером ИИ.');
            });
        }
    </script>
</body>
</html>
